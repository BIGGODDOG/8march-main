<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a1e"/>
      <stop offset="45%" style="stop-color:#2d0f3a"/>
      <stop offset="100%" style="stop-color:#1a1030"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8a4c8"/>
      <stop offset="50%" style="stop-color:#e8527a"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#e8527a;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <circle cx="300" cy="150" r="280" fill="#e8527a" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="900" cy="480" r="240" fill="#c084fc" opacity="0.07" filter="url(#blur1)"/>
  <circle cx="600" cy="315" r="200" fill="#f8a4c8" opacity="0.05" filter="url(#blur2)"/>

  <!-- Decorative petals scattered -->
  <text x="80" y="120" font-size="48" opacity="0.25">🌸</text>
  <text x="1060" y="100" font-size="40" opacity="0.2">🌺</text>
  <text x="1100" y="540" font-size="52" opacity="0.22">🌸</text>
  <text x="60" y="560" font-size="36" opacity="0.18">🌷</text>
  <text x="160" y="510" font-size="28" opacity="0.15">✿</text>
  <text x="980" y="200" font-size="32" opacity="0.15">❀</text>
  <text x="520" y="80" font-size="24" opacity="0.12">🌸</text>
  <text x="700" y="570" font-size="30" opacity="0.14">🌺</text>

  <!-- Top label -->
  <text x="600" y="195" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="18"
    letter-spacing="8"
    fill="white"
    opacity="0.35">8 МАРТА 2026</text>

  <!-- Main title -->
  <text x="600" y="320" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="128"
    font-weight="bold"
    fill="url(#title-grad)">С 8 Марта</text>

  <!-- Subtitle -->
  <text x="600" y="385" text-anchor="middle"
    font-family="Georgia, serif"
    font-style="italic"
    font-size="32"
    fill="white"
    opacity="0.45">для самой лучшей</text>

  <!-- Divider line -->
  <line x1="460" y1="415" x2="740" y2="415" stroke="white" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Bottom hint -->
  <text x="600" y="455" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="20"
    fill="white"
    opacity="0.28">Там что-то персональное для тебя ✨</text>

</svg>
